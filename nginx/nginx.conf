upstream client {
    server client:4173;
}

upstream server {
    server server:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.hrdatasa.com hrdatasa.com;

    return 301 https://hrdatasa.com$request_uri;
}

server {
    listen 443;
    listen [::]:443;
    http2 on;
    server_name www.hrdatasa.com;

    return 301 https://hrdatasa.com$request_uri;
}

server {
    listen 443;
    server_name hrdatasa.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://client;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
