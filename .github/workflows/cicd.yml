name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: CI
        run: |
          npm run type:check

      - name: CD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            APP_DIR="/var/www/hrdata"

            echo "📁 Creating app directory..."
            mkdir -p $APP_DIR

            echo "🔐 Setting up GitHub deploy key..."
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh

            echo "${{ secrets.GIT_DEPLOY_KEY }}" > ~/.ssh/github_deploy
            chmod 600 ~/.ssh/github_deploy

            cat > ~/.ssh/config <<EOF
            Host github.com
              HostName github.com
              User git
              IdentityFile ~/.ssh/github_deploy
              IdentitiesOnly yes
            EOF

            chmod 600 ~/.ssh/config

            echo "📌 Adding GitHub to known hosts..."
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "🔨 First-time setup - cloning repository..."

              git clone git@github.com:${{ secrets.GIT_REPO_URL }} $APP_DIR

              cd $APP_DIR
              git checkout main
            else
              echo "📥 Pulling latest code..."

              cd $APP_DIR

              git fetch origin
              git reset --hard origin/main
            fi

            echo "📦 Installing Docker Compose services..."
            docker compose --env-file .env.container pull || true

            echo "🐳 Building containers..."
            docker compose --env-file .env.container build

            echo "♻️ Restarting containers..."
            docker compose --env-file .env.container up -d --remove-orphans

            echo "🧹 Cleaning unused Docker images..."
            docker image prune -af

            echo "✅ Deployment completed successfully"
